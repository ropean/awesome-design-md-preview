name: Bug Report
description: Report a bug or visual issue on the preview site
title: "[Bug] "
labels: ["bug"]

body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Which page has the issue?
      placeholder: https://awesome-design-md-preview.pages.dev/themes/airbnb/
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: Chrome 124 / macOS 14
    validations:
      required: false
